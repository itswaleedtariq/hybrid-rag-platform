services:
  backend:
    build: ./backend
    environment:
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.3-70b-versatile}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-this-before-production}
      DATABASE_URL: sqlite:///./data/rag_platform.db
      CHROMA_PATH: ./chroma_db
      UPLOAD_PATH: ./uploads
      CORS_ORIGINS: http://localhost:3000,http://localhost:5173
    volumes:
      - rag_data:/app/data
      - rag_uploads:/app/uploads
      - rag_chroma:/app/chroma_db
    ports:
      - "8000:8000"
  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:8000/api
    ports:
      - "3000:80"
    depends_on: [backend]
volumes:
  rag_data:
  rag_uploads:
  rag_chroma:
